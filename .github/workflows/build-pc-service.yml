# =============================================================================
# PazarChat PC Service — Otomatik Windows Build
# =============================================================================
# Bu workflow Windows runner'da PyInstaller ile .exe build alır ve:
#   - Her tag push'ında (v0.1.0 gibi) GitHub Release'e otomatik yayınlar
#   - Manuel olarak Actions sekmesinden "Run workflow" ile tetiklenebilir
#
# Tetikleme:
#   git tag v0.1.0 && git push --tags    → otomatik release
#   GitHub Actions UI → Run workflow      → sadece artifact
# =============================================================================

name: Build PC Service (Windows)

on:
  push:
    tags:
      - 'v*'             # v0.1.0, v0.1.0-beta gibi
  workflow_dispatch:     # Manuel tetikleme (Actions UI'dan)

permissions:
  contents: write        # release oluşturma için gerek

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: pc-service

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pc-service/requirements.txt

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.10.0

      - name: PyInstaller ile .exe build
        run: pyinstaller --clean --noconfirm pazarchat.spec

      - name: Build çıktısının boyutunu logla
        run: |
          Get-ChildItem -Recurse dist\PazarChat | Measure-Object -Property Length -Sum |
            Select-Object @{N='Total MB';E={"{0:N1}" -f ($_.Sum/1MB)}}, Count

      - name: ZIP'e paketle
        run: |
          cd dist
          Compress-Archive -Path PazarChat\* -DestinationPath PazarChat-windows.zip -CompressionLevel Optimal
          Get-Item PazarChat-windows.zip | Select-Object Name, @{N='Size MB';E={"{0:N1}" -f ($_.Length/1MB)}}

      - name: Artifact olarak yükle (her run'da kalır)
        uses: actions/upload-artifact@v4
        with:
          name: PazarChat-windows
          path: pc-service/dist/PazarChat-windows.zip
          retention-days: 30

      - name: GitHub Release oluştur (sadece tag push'ta)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          # ref_name 'v*' pattern'inde dışarıdan gelir; env ile sarmak daha güvenli
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          files: pc-service/dist/PazarChat-windows.zip
          body: |
            ## PazarChat PC Servisi — Beta Yayın

            ### Kurulum
            1. `PazarChat-windows.zip` dosyasını indir
            2. Bir klasöre çıkar (örn. `C:\PazarChat`)
            3. `.env.example`'ı `.env` olarak kopyala, notepad ile lisans + karakter doldur
            4. `PazarChat.exe`'yi çift tıkla

            ### Gereksinimler
            - Windows 10/11 (64-bit)
            - Knight Online windowed mode
            - Telegram bot'tan davetiye + lisans anahtarı

            **Microsoft Defender uyarısı:** İmzasız .exe → "Tanınmayan uygulama" uyarısı normal.
            "Diğer bilgi" → "Yine de çalıştır" ile geç. Production'da code signing eklenecek.
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
